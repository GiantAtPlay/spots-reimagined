name: UI Tests

on:
  pull_request:
    paths:
      - 'src/Spots.App/**'
      - '.github/workflows/ci-ui.yml'

concurrency:
  group: ui-tests-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run UI Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/Spots.App

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/Spots.App/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --run
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: src/Spots.App/test-results/results.xml
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Vitest Tests
          path: src/Spots.App/test-results/results.xml
          reporter: java-junit
          fail-on: test_failures
