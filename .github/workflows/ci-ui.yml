name: UI Tests

on:
  pull_request:
    paths:
      - 'src/Spots.App/**'
      - '.github/workflows/ci-ui.yml'

concurrency:
  group: ui-tests-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  checks: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/Spots.App/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/Spots.App

      - name: Run tests
        run: npm run test -- --run
        working-directory: src/Spots.App
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: src/Spots.App/test-results/results.xml
          retention-days: 14
