version: '3.8'

services:
  spots:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:80"
      - "5001:443"
    volumes:
      - spots-data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http+:80;https+:443
    restart: unless-stopped

volumes:
  spots-data:
